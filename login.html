<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLYX — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --purple:#7c3aed;--blue:#3b82f6;--cyan:#06b6d4;
  --grad:linear-gradient(135deg,#7c3aed 0%,#3b82f6 50%,#06b6d4 100%);
  --text:#1a1040;--text-soft:#64748b;--border:rgba(124,58,237,.15);
}
html,body{min-height:100%;}
body{
  background:linear-gradient(145deg,#0d0820 0%,#12082e 55%,#0a1430 100%);
  font-family:'Tajawal',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 16px;overflow-x:hidden;
}

/* BG */
.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(124,58,237,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.06) 1px,transparent 1px);background-size:44px 44px;}
.blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;animation:drift 12s ease-in-out infinite;}
.b1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.22),transparent 70%);top:-140px;right:-100px;}
.b2{width:380px;height:380px;background:radial-gradient(circle,rgba(59,130,246,.14),transparent 70%);bottom:-100px;left:-80px;animation-delay:-6s;}
.b3{width:260px;height:260px;background:radial-gradient(circle,rgba(6,182,212,.1),transparent 70%);top:50%;right:12%;animation-delay:-3s;}
@keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(18px,-18px);}}

/* LANG SWITCHER */
#langBar{position:fixed;top:20px;right:24px;z-index:50;}

/* CARD */
.login-card{
  background:rgba(255,255,255,.97);
  border-radius:32px;padding:52px 44px;
  width:92%;max-width:440px;
  box-shadow:0 40px 120px rgba(124,58,237,.38),0 0 0 1px rgba(124,58,237,.12);
  position:relative;z-index:10;
  animation:up .7s cubic-bezier(.34,1.3,.64,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(40px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:6px;}
.login-tagline{text-align:center;font-size:.82rem;color:var(--text-soft);margin-bottom:36px;}
.login-title{font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800;color:var(--text);margin-bottom:5px;}
.login-sub{font-size:.85rem;color:var(--text-soft);margin-bottom:28px;line-height:1.6;}

.err-box{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:10px 14px;font-size:.82rem;color:#dc2626;margin-bottom:16px;display:none;animation:up .3s both;}

.fw{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.fl{font-size:.78rem;font-weight:600;color:var(--text);}
.fi-wrap{position:relative;}
.fi{width:100%;padding:13px 44px 13px 16px;border:1.5px solid rgba(124,58,237,.2);border-radius:14px;font-family:'Tajawal',sans-serif;font-size:.93rem;color:var(--text);outline:none;background:#fafaff;transition:border-color .2s,box-shadow .2s;}
.fi:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.1);background:white;}
.fi::placeholder{color:#bbb;}
.fi-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;}

.btn-login{width:100%;padding:15px;background:var(--grad);color:white;border:none;border-radius:50px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;box-shadow:0 8px 28px rgba(124,58,237,.42);transition:transform .2s,box-shadow .3s;margin-top:6px;}
.btn-login:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(124,58,237,.55);}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.div-line{flex:1;height:1px;background:rgba(124,58,237,.12);}
.div-text{font-size:.7rem;color:var(--text-soft);}

.footer-link{text-align:center;font-size:.8rem;color:var(--text-soft);}
.footer-link a{color:var(--purple);font-weight:700;text-decoration:none;}
.footer-link a:hover{text-decoration:underline;}

/* BOTTOM BRAND */
.bottom-brand{margin-top:28px;position:relative;z-index:10;font-size:.72rem;color:rgba(255,255,255,.3);}
.bottom-brand a{color:rgba(124,171,237,.5);text-decoration:none;font-weight:700;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

<div id="langBar"></div>

<div class="login-card">
  <div class="login-logo">KLYX</div>
  <div class="login-tagline" data-i18n="login_tagline">مساحتك الرقمية الخاصة</div>

  <div class="login-title" data-i18n="login_title">أهلاً بعودتك 👋</div>
  <p class="login-sub" data-i18n="login_sub">ادخل على حسابك لإدارة بطاقتك الرقمية</p>

  <div class="err-box" id="errBox" data-i18n="login_err">البريد الإلكتروني أو كلمة المرور غير صحيحة</div>

  <div class="fw">
    <label class="fl" data-i18n="login_email">البريد الإلكتروني</label>
    <div class="fi-wrap">
      <input class="fi" id="email" type="email" dir="ltr" placeholder="your@email.com" autocomplete="email" />
      <span class="fi-icon">✉️</span>
    </div>
  </div>

  <div class="fw">
    <label class="fl" data-i18n="login_pwd">كلمة المرور</label>
    <div class="fi-wrap">
      <input class="fi" id="password" type="password" dir="ltr" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
      <span class="fi-icon">🔑</span>
    </div>
  </div>

  <button class="btn-login" onclick="doLogin()" data-i18n="login_btn">تسجيل الدخول</button>

  <div class="divider"><div class="div-line"></div><div class="div-text">أو</div><div class="div-line"></div></div>

  <div class="footer-link">
    <span data-i18n="login_no_account">ليس لديك حساب؟</span>
    <a href="index.html#products" data-i18n="login_no_account_link"> اطلب بطاقتك الآن ←</a>
  </div>
</div>

<div class="bottom-brand">
  <a href="index.html">KLYX</a> · NFC Digital Cards
</div>

<script src="i18n.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Check already logged in
  if (localStorage.getItem('klyxCurrentUser')) {
    window.location.href = 'dashboard.html';
    return;
  }

  KlyxI18n.init();

  // Inject lang switcher
  const lb = document.getElementById('langBar');
  lb.className = 'klyx-lang-switcher';
  lb.innerHTML = `
    <button class="lang-btn" data-lang="ar" onclick="KlyxI18n.set('ar')">ع</button>
    <button class="lang-btn" data-lang="fr" onclick="KlyxI18n.set('fr')">FR</button>
    <button class="lang-btn" data-lang="en" onclick="KlyxI18n.set('en')">EN</button>
  `;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === KlyxI18n.current));
});

function showErr(msg) {
  const box = document.getElementById('errBox');
  box.textContent = msg;
  box.style.display = 'block';
}

function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const box   = document.getElementById('errBox');
  box.style.display = 'none';

  if (!email || !pass) { showErr(KlyxI18n.t('login_err_empty')); return; }

  const stored = localStorage.getItem('klyxAccount_' + email);
  if (!stored) { showErr(KlyxI18n.t('login_err_nouser')); return; }

  const account = JSON.parse(stored);
  if (account.password !== pass) { showErr(KlyxI18n.t('login_err')); return; }

  localStorage.setItem('klyxCurrentUser', email);
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
